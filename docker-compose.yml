services:
  app:
    build: .
    # Survive host reboots, OOM kills, and crashes on the home server — the
    # healthcheck only marks the container unhealthy; this is what acts on it.
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/coop.db
      IMAGES_DIR: /data/images
      SEED_DEMO: ${SEED_DEMO:-0}
      # VLM extraction (blueprint 04 §3): off | fixture | live. e2e runs with
      # EXTRACTION_MODE=fixture; the API key is passed through the host env at
      # runtime and is never baked into the image.
      EXTRACTION_MODE: ${EXTRACTION_MODE:-off}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Web push (blueprint 04 §4). No committed key ever serves a real
      # deployment: empty values disable push, and demo/e2e stacks
      # (SEED_DEMO=1) get a publicly known dev keypair injected by the
      # entrypoint — which REFUSES to start if that dev pair is configured
      # outside demo mode. Generate your own for a real deployment
      # (`npx web-push generate-vapid-keys`) and set these in the host env.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:potluck@example.com}
      # Mail substrate (Phase 3 Round A; docs/REWORK.md N1–N11). MAIL_MODE
      # defaults to capture (record to CapturedEmail, never touch SMTP); the
      # entrypoint refuses a seeded stack that would send unfiltered to real
      # recipients. EMAIL_* are the DreamHost transport creds (live in the
      # gitignored .env / host env; empty here disables live send). The
      # MAIL_DEV_* vars are the fail-closed dev filter; MAIL_PRODUCTION=1 is the
      # explicit prod opt-in that disables that filter.
      MAIL_MODE: ${MAIL_MODE:-capture}
      MAIL_PRODUCTION: ${MAIL_PRODUCTION:-}
      MAIL_DEV_ALLOWLIST: ${MAIL_DEV_ALLOWLIST:-}
      MAIL_DEV_REDIRECT: ${MAIL_DEV_REDIRECT:-}
      MAIL_DEV_SUBJECT_PREFIX: ${MAIL_DEV_SUBJECT_PREFIX:-}
      MAIL_PUBLIC_URL: ${MAIL_PUBLIC_URL:-https://potluckmutualaid.app}
      MAIL_UNSUB_SECRET: ${MAIL_UNSUB_SECRET:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_SMTP_SERVER: ${EMAIL_SMTP_SERVER:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_IMAP_SERVER: ${EMAIL_IMAP_SERVER:-}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
    volumes:
      - coop-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  coop-data:
