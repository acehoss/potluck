services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/coop.db
      IMAGES_DIR: /data/images
      SEED_DEMO: ${SEED_DEMO:-0}
      # VLM extraction (blueprint 04 §3): off | fixture | live. e2e runs with
      # EXTRACTION_MODE=fixture; the API key is passed through the host env at
      # runtime and is never baked into the image.
      EXTRACTION_MODE: ${EXTRACTION_MODE:-off}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - coop-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  coop-data:
